# Hide & Seek Plugin Configuration

# List of available map world names
# These must match the world names in maps.yml
maps:
  - "map1"

# NOTE: Map-specific configuration (spawn-points, allowed-blocks, world-borders, preferred-modes)
# is saved in maps.yml. See that file for per-map settings.

# Global disallowed blockstate properties
# Properties listed here won't appear in the appearance GUI for ANY block
disallowed-blockstates:
  - "waterlogged"
  - "conditional"

seeker-break-blocks:
  - "SHORT_GRASS"
  - "TALL_GRASS"
  - "SEAGRASS"
  - "TALL_SEAGRASS"

  # Game settings
game:
  # Apply player facing direction to placed blockstate in BLOCK mode
  # true = align facing/axis/rotation/half with player look
  # false = keep the chosen blockstate exactly as selected in the appearance GUI
  apply-player-direction: true

  # Maximum air blocks above water/lava that still allow hiding placement
  max-air-above-liquid: 2

# Setting default values (automatically registered, can be overridden via /mg setting command)
settings:
  had:
    gametype: "NORMAL"  # NORMAL, BLOCK, SMALL
    gamestyle: "SPECTATOR"  # SPECTATOR, INVASION, INFINITE
    hiding_time: 60  # seconds
    seeking_time: 300  # seconds
    hider_invisibility: false
    small_mode_size: 0.5  # scale for SMALL mode
    random_team_distribution: true
    seeker_count: 1
    hider_health: 20  # half-hearts
    block_view_height: 0.1  # height offset when hiding as block

    points:
      hider: 1  # points per 5 seconds hiding
      seeker_find: 10  # points for finding a hider
      taunt_cat: 5  # points for using cat taunt
      taunt_firecracker: 10  # points for using firecracker

  hider-items:
    cat-taunt:
      cooldown: 8  # seconds
      points: 5
      volume: 1.0
      pitch: 0.8

    explosion:
      cooldown: 8  # seconds
      points: 10
      volume: 0.65
      pitch: 1.5
      smoke-particles: 3  # particles per tick
      fuse-time: 40  # ticks (20 = 1 second)

    speed-boost:
      type: "SPEED_EFFECT"  # SPEED_EFFECT or VELOCITY_BOOST
      cooldown: 10  # seconds
      duration: 5  # seconds (SPEED_EFFECT only)
      boost-power: 0.5  # velocity multiplier (VELOCITY_BOOST only)
      amplifier-bonus: 0.2  # bonus per crossbow hit level

    crossbow:
      cooldown: 5  # seconds

    random-block:
      cooldown: 3  # seconds

  seeker-items:
    grappling-hook:
      cooldown: 2  # seconds
      speed: 1.5  # movement speed multiplier
      max-distance: 30  # blocks

  blockstats:
    show-names: false  # show player names in block stats GUI

  teams:
    max_teams: 2
    max_per_team: 10
    max_total_players: 20
    min_teams: 2
    min_per_team: 1
    min_total_players: 2
