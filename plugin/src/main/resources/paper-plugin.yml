name: HideAndSeek
version: '1.0-SNAPSHOT'
main: de.thecoolcraft11.hideAndSeek.HideAndSeek
bootstrapper: de.thecoolcraft11.hideAndSeek.HideAndSeekBootstrapper
api-version: '1.21'
description: A minigame plugin
authors:
  - TheCoolcraft11

dependencies:
  server:
    MinigameFramework:
      required: true
      load: BEFORE
    Timer:
      required: false
      load: BEFORE
    PlaceholderAPI:
      required: false
      load: BEFORE

permissions:
  hideandseek.command.loadout:
    description: Allows using /mg loadout command
    default: true
  hideandseek.command.loadout.admin:
    description: Allows using the admin loadout management GUI
    default: op
  hideandseek.command.map:
    description: Allows selecting and setting maps
    default: op
  hideandseek.command.vote:
    description: Allows using /mg vote command
    default: true
  hideandseek.command.ready:
    description: Allows toggling ready status with /mg ready
    default: true
  hideandseek.command.ready.gui:
    description: Allows opening the readiness overview GUI
    default: op
  hideandseek.command.skin:
    description: Allows using /mg skin command
    default: true
  hideandseek.command.unstuck:
    description: Allows using /mg unstuck command
    default: true
