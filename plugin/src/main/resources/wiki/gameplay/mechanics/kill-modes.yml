body: |
  Seekers have different kill modes that change how they eliminate hiders.
  
  <bold>NORMAL Mode</bold>
  Hiders have standard health. Seekers must damage hiders through normal combat to eliminate them. Hits with the Seeker's Blade deal damage based on charge time.
  
  <bold>ONE HIT Mode</bold>
  Any successful hit on a hider instantly eliminates them. There is no health management — one touch is all it takes.
  
  <bold>GAZE KILL Mode</bold>
  Seekers can eliminate hiders simply by looking at them within range and line-of-sight. A laser particle line indicates the gaze target. This mode has a cooldown between kills.

