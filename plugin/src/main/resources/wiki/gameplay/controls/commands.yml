body: |
  All commands are used via <gold>/mg <subcommand></gold> (or <gold>/minigame <subcommand></gold>).
  
  <bold>Player Commands:</bold>
  
  <gold>/mg loadout</gold> — Opens the loadout selection GUI where you can choose your items for the round.
  Aliases: <gray>/mg kit, /mg items</gray>
  
  <gold>/mg vote</gold> — Opens the voting GUI to vote for maps, game modes, and preferred roles.
  
  <gold>/mg ready</gold> — Toggles your ready status. When all players are ready, the game starts immediately.
  Aliases: <gray>/mg rdy</gray>
  
  <gold>/mg skin <item> <variant></gold> — Select a skin (variant) for a specific item. Use <gold>/mg skin list <item></gold> to see available skins.
  Aliases: <gray>/mg skins, /mg variant, /mg itemskin</gray>
  
  <gold>/mg stats</gold> — Opens the player statistics GUI to view your performance data.
  Aliases: <gray>/mg statistics</gray>
  
  <gold>/mg unstuck</gold> — Attempts to teleport you to a safe position if you are stuck. Requires a 5-second channel and you must stay still.
  Aliases: <gray>/mg stuckfix</gray>
  Use <gold>/mg unstuck spawn</gold> to teleport to the world spawn instead.
  
  <bold>Admin Commands:</bold>
  
  <gold>/mg map [name]</gold> — Opens the map selection GUI or directly selects a map.
  Aliases: <gray>/mg selectmap, /mg choosemap</gray>
  
  <gold>/mg loadout admin</gold> — Opens the admin loadout management GUI.
  
  <gold>/mg debug <subcommand></gold> — Debug utilities. Subcommands: anticheat, points, coins, skins, loadout, perks, config, unstuck, migrateyaml, xp, booster.

