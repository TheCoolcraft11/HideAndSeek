body: |
  <bold>Learn the Items:</bold>
  Both roles have a wide variety of items. Take time to learn what each item does and when to use it. The right item at the right moment can turn the tide.
  
  <bold>Use Your Loadout:</bold>
  Don't skip the lobby loadout selection. Choose items that complement your playstyle. Hiders might prefer escape tools, while seekers should focus on tracking and trapping.
  
  <bold>Earn Points:</bold>
  Actively participating earns you points, which convert to coins at the end of the round. Even if you lose, playing well earns rewards.
  
  <bold>Customize Your Appearance:</bold>
  Use the skins system and Appearance Editor to personalize your items and block disguise. Some skins provide visual benefits (harder to spot).
  
  <bold>Communicate:</bold>
  Coordinate with your team. Seekers can cover more ground together, and hiders can warn each other about seeker positions.
  
  <bold>Watch the Timer:</bold>
  The round timer dictates the pace. Hiders should survive until the end; seekers should eliminate efficiently.

