body: |
  The anti-camping system prevents hiders from staying in one spot for too long.
  
  If a hider remains within a small radius for an extended period, they receive:
  1. Warning titles and particle effects
  2. Gradual damage that increases over time
  
  Camping damage is tracked as environmental damage and will show a custom death message. Moving to a different area resets the camping timer.
  
  <bold>Tips:</bold>
  - Keep moving and change hiding spots periodically
  - Use items like smoke bombs or speed boost to relocate safely
  - Camping deaths still count as environmental eliminations, awarding points to all seekers

