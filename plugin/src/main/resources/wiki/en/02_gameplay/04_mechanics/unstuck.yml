body: |
  If you find yourself stuck in a block or an inaccessible area, use the <gold>/mg unstuck</gold> command.
  
  The system works as follows:
  1. Activate the command — a 5-second channel begins
  2. You must stay still during the channel (moving cancels it)
  3. Sneaking for 3+ seconds also cancels the teleport
  4. After the channel, you are teleported to a safe position
  
  The system will try to:
  - Roll back to a recent safe position you occupied
  - Find the nearest safe ground nearby
  - Fall back to the round spawn point
  - As a last resort, teleport to world spawn (use <gold>/mg unstuck spawn</gold>)
  
  Hiders cannot use unstuck if a seeker is nearby (within range). The command has a cooldown between uses.

