body: |
  The visibility system determines what seekers can see during the game.
  
  <bold>During Hiding Phase:</bold>
  Seekers are completely blinded. They cannot move or see any hiders. This gives hiders time to find their hiding spots.
  
  <bold>During Seeking Phase:</bold>
  Seeker vision is managed by a line-of-sight and range system:
  - Seekers can only see hiders within a certain range
  - Hiders behind walls or obstructions are not visible
  - Seekers have a field-of-view (FOV) check — hiders behind the seeker are not visible
  - Hidden hiders (in BLOCK mode) are completely invisible as entities
  
  <bold>Anti-Cheat:</bold>
  The plugin uses NMS-level packet filtering to ensure seekers cannot see through walls or gain unfair advantages. Entity visibility is synchronized at the network level to prevent ghost players or cheating.

