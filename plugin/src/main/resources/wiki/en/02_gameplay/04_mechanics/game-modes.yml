body: |
  HideAndSeek features four game modes that change how hiders disguise themselves.
  
  <bold>NORMAL Mode</bold>
  Hiders appear as their normal player skin. No special disguise mechanics — hide using the environment and your items.
  
  <bold>SMALL Mode</bold>
  Hiders are shrunk to <#00ffff>%setting-game.small-mode.hider-size%</#00ffff> of their normal size. This makes it easier to hide in small spaces, behind blocks, or inside decorative elements.
  
  <bold>BLOCK Mode</bold>
  Hiders can disguise themselves as blocks by sneaking for a few seconds. Once disguised, they appear as a regular block to seekers. Use the Appearance Editor to choose your block type and block state. Breaking a hider's disguise block requires the correct tool for that block type.
  
  <bold>SKIN Mode</bold>
  Hiders can change their player skin to any skin loaded from the skin shop. This allows blending in with custom NPC skins or the environment.

