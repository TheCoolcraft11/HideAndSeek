body: |
  In <bold>BLOCK</bold> game mode, hiders can disguise themselves as any block in the game.
  
  To disguise, simply sneak (hold shift) for a few seconds. A progress bar on your XP bar shows the disguise progress. Once disguised, you appear as a regular block to all seekers.
  
  Use the Appearance Editor to select which block you want to disguise as. You can also customize block state properties (direction, waterlogged, etc.).
  
  <bold>While disguised:</bold>
  - You are invisible to seekers as a player entity
  - A block display entity appears in your place
  - Seekers can break your disguise block — using the correct tool for the block type deals extra damage
  - Moving or interacting cancels the disguise
  - You can peek by looking around without breaking disguise
  
  Use the Block Selector to quickly cycle through your favorite blocks.

