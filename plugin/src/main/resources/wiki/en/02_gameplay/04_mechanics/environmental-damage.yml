body: |
  During the seeking phase, hiders can take damage from environmental sources:
  - Drowning
  - Fire and lava
  - Suffocation in walls
  - Freezing (powder snow)
  - Camping (staying in one place too long)
  - World border
  
  Environmental damage is tracked by the game and shown with custom death messages. Hiders have a brief grace period at the start of the seeking phase before environmental damage is fully enabled.
  
  If a hider dies from environmental causes, all seekers receive environmental elimination points.
  
  Some items like medkits and totems of undying can help you survive environmental hazards.

