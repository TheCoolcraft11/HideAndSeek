body: |
  The Adrenaline Rush system provides comeback buffs to balance the game when one side is at a disadvantage.
  
  <bold>Hider Adrenaline Rush</bold>
  When few hiders remain alive, all surviving hiders receive powerful buffs: Speed, Resistance, and Regeneration. This gives the remaining hiders a fighting chance to survive until the round ends.
  
  <bold>Seeker Adrenaline Rush</bold>
  When the round timer is running low and many hiders are still alive, seekers receive buffs: Speed, Haste, and Regeneration. This helps seekers finish the round before time runs out.
  
  Both rushes are accompanied by visual and audio feedback — titles, sounds, particles, and a fake world-border warning effect.

