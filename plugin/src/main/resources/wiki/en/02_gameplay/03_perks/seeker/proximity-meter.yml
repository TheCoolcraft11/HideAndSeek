body: |
  The <green>Proximity Meter</green> is a %perk-rarity-seeker_proximity_meter% seeker perk.
  
  Periodically displays a title showing how close you are to the nearest hider. The reading changes based on distance:
  - <red>Burning Hot</red> — within 5 blocks
  - <gold>Very Warm</gold> — within 10 blocks
  - <yellow>Warm</yellow> — within 18 blocks
  - <green>Lukewarm</green> — within 30 blocks
  - <aqua>Cool</aqua> — within 50 blocks
  - <gray>Cold</gray> — further than 50 blocks
  
  A sound ping plays with each reading, with higher pitch for closer targets.

