body: |
  The <green>Trap Sense</green> is a %perk-rarity-hider_trap_sense% hider perk.
  
  Reveals nearby seeker traps and utilities:
  - Shows particle effects around cage traps within range
  - Makes proximity sensor entities glow red
  - Makes cage trap indicators glow yellow
  - Makes camera entities glow blue
  - Warns you with a title and sound when you are close to a trap
  
  This perk is invaluable for hiders navigating areas where seekers have placed traps.

