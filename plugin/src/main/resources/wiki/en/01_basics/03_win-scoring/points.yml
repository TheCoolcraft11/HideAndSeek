id: "points"
name: "<green>Points</green>"
icon: "minecraft:gold_nugget"

description:
  - "<gray>How you earn points</gray>"

keywords:
  - ""

body: |
  {hider} earn <#00ffff>%setting-points.hider.survival.amount%</#00ffff> every <#00ffff>%setting-points.hider.survival.interval-seconds% seconds</#00ffff> after a delay of <#00ffff>%setting-points.hider.survival.start-delay-seconds% seconds</#00ffff>.
  {hider} near seekers gain <#00ffff>%setting-points.hider.proximity.amount-per-second%</#00ffff> per second while within <#00ffff>%setting-points.hider.proximity.range% blocks</#00ffff>.
  Escaping a near miss — being within <#00ffff>%setting-points.hider.near-miss.range% blocks</#00ffff> of a seeker and surviving for <#00ffff>%setting-points.hider.near-miss.escape-seconds% seconds</#00ffff> — awards <#00ffff>%setting-points.hider.near-miss.amount%</#00ffff>.
  Performing taunts grants <#00ffff>%setting-points.hider.taunt.small%</#00ffff> points for small taunts or <#00ffff>%setting-points.hider.taunt.large%</#00ffff> points for large taunts.
  Hitting seekers with a crossbow awards <#00ffff>%setting-points.hider.sharpshooter.amount%</#00ffff>.
  Surviving until the end of the round awards <#00ffff>%setting-points.hider.survivor.amount%</#00ffff>.
  Special bonuses:
  - Never being spotted by utility: <#00ffff>%setting-points.hider.special.ghost%</#00ffff>
  - Having the most proximity time near seekers: <#00ffff>%setting-points.hider.special.distractor%</#00ffff>
  {seeker} near hiders earn <#00ffff>%setting-points.seeker.active-hunter.amount-per-second%</#00ffff> per second while within <#00ffff>%setting-points.seeker.active-hunter.range% blocks</#00ffff>.
  Successfully using utility grants <#00ffff>%setting-points.seeker.utility-success.amount%</#00ffff>.
  Damaging a hider without eliminating them awards <#00ffff>%setting-points.seeker.interception.amount%</#00ffff>.
  Eliminating a hider awards <#00ffff>%setting-points.seeker.kill.amount%</#00ffff>.
  Assisting in an elimination within <#00ffff>%setting-points.seeker.assist.range% blocks</#00ffff> awards <#00ffff>%setting-points.seeker.assist.amount%</#00ffff>.
  Special bonus for the most captures: <#00ffff>%setting-points.seeker.special.bloodhound%</#00ffff>.
  The first elimination of the round awards <#00ffff>%setting-points.seeker.first-blood.amount%</#00ffff>.
  If a hider dies due to camping or the world border, all seekers receive <#00ffff>%setting-points.seeker.environmental-elimination.amount%</#00ffff>.

