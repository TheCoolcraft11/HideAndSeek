body: |
  <bold>Use Tracking Items:</bold>
  - Glowing compass reveals nearby hiders through walls
  - Proximity sensor alerts you when hiders enter an area
  - Camera lets you scout areas remotely with night vision
  - Phantom viewer reveals hider locations on a map
  - Scent trail shows you where hiders have been
  
  <bold>Control the Battlefield:</bold>
  - Cage trap immobilizes hiders, making them easy targets
  - Curse spell weakens hiders so they take more damage
  - Block randomizer forces hiders out of disguise
  - Lightning freeze stops hiders in their tracks
  
  <bold>Use Mobility Items:</bold>
  - Grappling hook helps you reach high places quickly
  - Chain pull yanks hiders toward you
  - Ink splash blinds hiders, making them easy targets
  
  <bold>Throw Your Sword:</bold>
  The Seeker's Blade can be thrown by holding right-click. The longer you charge, the stronger the throw. Master the timing for long-range eliminations.
  
  <bold>Work Together:</bold>
  Coordinate with other seekers to corner hiders. Use seeker assistant to patrol areas while you search elsewhere.
  
  <bold>Buy Perks:</bold>
  Seeker perks like Proximity Meter, Death Zone, or Random Swap give you powerful advantages. Use your points wisely.

