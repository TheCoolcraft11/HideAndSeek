body: |
  <bold>Keep Moving:</bold>
  The anti-camping system punishes staying still too long. Change hiding spots regularly.
  
  <bold>Use Your Items Wisely:</bold>
  - Smoke bombs are great for breaking line-of-sight when escaping
  - Ghost essence lets you phase through walls — use it to reach hidden areas
  - Speed boost helps you outrun seekers; upgrade it with the tracker crossbow
  - Invisibility cloak lets you disappear in plain sight
  - Medkit restores health; use it after taking damage
  - Totem of undying gives you a second chance
  
  <bold>Know Your Mode:</bold>
  In block mode, choose blocks that blend in with the environment. In game modes, small mode shrinks you — hide in small gaps and behind slabs.
  
  <bold>Use the Environment:</bold>
  Hide behind walls, inside decorative structures, or in dark corners. Seekers have limited visibility range.
  
  <bold>Watch for Seekers:</bold>
  Listen for sounds and watch for particles. If you have the Seeker Warning perk, use the alerts to know when to hide.
  
  <bold>Use /unstuck:</bold>
  If you get stuck in a block or can't move, use the /unstuck command. But make sure no seeker is nearby!
  
  <bold>Buy Perks:</bold>
  Spend your points on perks in the perk shop. Good perks like Double Jump or Seeker Warning can save your life.

