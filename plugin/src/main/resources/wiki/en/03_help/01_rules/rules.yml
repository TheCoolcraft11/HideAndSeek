body: |
  <bold>1. No Cheating</bold>
  Do not use hacked clients, x-ray texture packs, or any external modifications that give you an unfair advantage. The plugin includes anti-cheat visibility systems to prevent wall-hacking.
  
  <bold>2. No Ghosting</bold>
  Do not share information about hider locations with seekers (or vice versa) through external communication. This ruins the game for everyone.
  
  <bold>3. No Exploiting</bold>
  Do not abuse glitches, bugs, or unintended mechanics. Report any bugs to the server staff.
  
  <bold>4. No Teaming Across Teams</bold>
  Hiders and seekers should not collaborate. Play your role fairly.
  
  <bold>5. No Camping in One Spot</bold>
  Hiders must keep moving. The anti-camping system will punish players who stay in one location too long.
  
  <bold>6. Respect Others</bold>
  Treat all players with respect. Harassment, toxic behavior, or unsportsmanlike conduct will not be tolerated.
  
  <bold>7. Follow Staff Instructions</bold>
  Server administrators and moderators have the final say. Follow their instructions at all times.
  
  Violating these rules may result in warnings, temporary bans, or permanent bans depending on severity.

