id: "points"
name: "<green>Punkte</green>"
icon: "minecraft:gold_nugget"

description:
  - "<gray>Wie du Punkte verdienst</gray>"

keywords:
  - ""

body: |
  {hider} verdienen <#00ffff>%setting-points.hider.survival.amount%</#00ffff> alle <#00ffff>%setting-points.hider.survival.interval-seconds% Sekunden</#00ffff> nach einer Verzögerung von <#00ffff>%setting-points.hider.survival.start-delay-seconds% Sekunden</#00ffff>.
  {hider} in der Nähe von Seeker erhalten <#00ffff>%setting-points.hider.proximity.amount-per-second%</#00ffff> pro Sekunde, solange sie sich innerhalb von <#00ffff>%setting-points.hider.proximity.range% Blöcken</#00ffff> befinden.
  Das Entkommen einer Beinahe-Entdeckung — innerhalb von <#00ffff>%setting-points.hider.near-miss.range% Blöcken</#00ffff> eines Seekers und Überleben für <#00ffff>%setting-points.hider.near-miss.escape-seconds% Sekunden</#00ffff> — gibt <#00ffff>%setting-points.hider.near-miss.amount%</#00ffff>.
  Das Ausführen von Taunts gibt <#00ffff>%setting-points.hider.taunt.small%</#00ffff> Punkte für kleine Taunts oder <#00ffff>%setting-points.hider.taunt.large%</#00ffff> Punkte für große Taunts.
  Das Treffen von Seeker mit einer Armbrust gibt <#00ffff>%setting-points.hider.sharpshooter.amount%</#00ffff>.
  Das Überleben bis zum Ende der Runde gibt <#00ffff>%setting-points.hider.survivor.amount%</#00ffff>.
  Spezialboni:
  - Niemals durch Utility entdeckt werden: <#00ffff>%setting-points.hider.special.ghost%</#00ffff>
  - Die meiste Zeit in der Nähe von Seeker verbringen: <#00ffff>%setting-points.hider.special.distractor%</#00ffff>
  {seeker} in der Nähe von Hider erhalten <#00ffff>%setting-points.seeker.active-hunter.amount-per-second%</#00ffff> pro Sekunde, solange sie sich innerhalb von <#00ffff>%setting-points.seeker.active-hunter.range% Blöcken</#00ffff> befinden.
  Erfolgreicher Einsatz von Utility gibt <#00ffff>%setting-points.seeker.utility-success.amount%</#00ffff>.
  Einem Hider Schaden zuzufügen, ohne ihn zu eliminieren, gibt <#00ffff>%setting-points.seeker.interception.amount%</#00ffff>.
  Das Eliminieren eines Hiders gibt <#00ffff>%setting-points.seeker.kill.amount%</#00ffff>.
  Die Unterstützung bei einer Eliminierung innerhalb von <#00ffff>%setting-points.seeker.assist.range% Blöcken</#00ffff> gibt <#00ffff>%setting-points.seeker.assist.amount%</#00ffff>.
  Spezialbonus für die meisten Fänge: <#00ffff>%setting-points.seeker.special.bloodhound%</#00ffff>.
  Die erste Eliminierung der Runde gibt <#00ffff>%setting-points.seeker.first-blood.amount%</#00ffff>.
  Wenn ein Hider durch Camping oder die Weltgrenze stirbt, erhalten alle Seeker <#00ffff>%setting-points.seeker.environmental-elimination.amount%</#00ffff>.

