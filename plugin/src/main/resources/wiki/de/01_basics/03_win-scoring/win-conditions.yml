body: |
  {hider} gewinnen, wenn mindestens ein Hider noch am Leben ist, wenn die Runde endet.
  {seeker} gewinnen, wenn alle Hider gefunden wurden und keine aktiven Hider mehr übrig sind, bevor die Runde endet.
  
  Transformierte Hider erhalten keine Siegbelohnungen, unabhängig davon, ob die {seeker} oder {hider} gewinnen.

