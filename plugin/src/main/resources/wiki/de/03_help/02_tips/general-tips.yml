body: |
  <bold>Lerne die Gegenstände kennen:</bold>
  Beide Rollen haben eine große Auswahl an Gegenständen. Nimm dir Zeit, um zu lernen, was jeder Gegenstand tut und wann du ihn einsetzen solltest. Der richtige Gegenstand zur richtigen Zeit kann das Blatt wenden.
  
  <bold>Nutze deine Ausrüstung:</bold>
  Überspringe die Ausrüstungsauswahl in der Lobby nicht. Wähle Gegenstände, die deinen Spielstil ergänzen. Verstecker bevorzugen vielleicht Fluchtwerkzeuge, während Sucher sich auf Verfolgung und Fallenstellen konzentrieren sollten.
  
  <bold>Sammle Punkte:</bold>
  Aktive Teilnahme bringt dir Punkte ein, die am Ende der Runde in Münzen umgewandelt werden. Selbst wenn du verlierst, bringt gutes Spielen Belohnungen.
  
  <bold>Passe dein Aussehen an:</bold>
  Nutze das Skinsystem und den Appearance Editor, um deine Gegenstände und Block-Tarnung zu personalisieren. Manche Skins bieten visuelle Vorteile (schwerer zu entdecken).
  
  <bold>Kommuniziere:</bold>
  Koordiniere dich mit deinem Team. Sucher können gemeinsam mehr Fläche abdecken, und Verstecker können sich gegenseitig vor Sucher-Positionen warnen.
  
  <bold>Behalte den Timer im Auge:</bold>
  Der Runden-Timer gibt das Tempo vor. Verstecker sollten bis zum Ende überleben; Sucher sollten effizient eliminieren.

