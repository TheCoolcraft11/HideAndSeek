body: |
  <bold>Bleib in Bewegung:</bold>
  Das Anti-Camping-System bestraft zu langes Stillstehen. Wechsle regelmäßig deine Verstecke.
  
  <bold>Nutze deine Gegenstände mit Bedacht:</bold>
  - Rauchbomben sind großartig, um die Sichtlinie bei der Flucht zu unterbrechen
  - Geisteressenz lässt dich durch Wände gleiten — nutze sie, um versteckte Bereiche zu erreichen
  - Geschwindigkeitsschub hilft dir, Sucher zu überholen; verbessere ihn mit der Spionage-Armbrust
  - Tarnumhang lässt dich direkt vor ihren Augen verschwinden
  - Medkit stellt deine Gesundheit wieder her; nutze es nach erlittenem Schaden
  - Totem der Unsterblichkeit gibt dir eine zweite Chance
  
  <bold>Kenne deinen Modus:</bold>
  Im Block-Modus wähle Blöcke, die sich in die Umgebung einfügen. In Spielmodi schrumpft dich der Klein-Modus — verstecke dich in kleinen Lücken und hinter Platten.
  
  <bold>Nutze die Umgebung:</bold>
  Verstecke dich hinter Wänden, in dekorativen Strukturen oder in dunklen Ecken. Sucher haben eine begrenzte Sichtweite.
  
  <bold>Halte Ausschau nach Suchern:</bold>
  Horche auf Geräusche und achte auf Partikel. Wenn du die Seeker Warning-Fähigkeit hast, nutze die Warnungen, um zu wissen, wann du dich verstecken musst.
  
  <bold>Nutze /unstuck:</bold>
  Wenn du in einem Block stecken bleibst oder dich nicht bewegen kannst, benutze den Befehl /unstuck. Aber stell sicher, dass kein Sucher in der Nähe ist!
  
  <bold>Kaufe Fähigkeiten:</bold>
  Gib deine Punkte im Fähigkeiten-Shop für Fähigkeiten aus. Gute Fähigkeiten wie Double Jump oder Seeker Warning können dein Leben retten.

