body: |
  <bold>Nutze Verfolgungsgegenstände:</bold>
  - Leuchtkompass enthüllt nahe Verstecker durch Wände
  - Näherungssensor alarmiert dich, wenn Verstecker einen Bereich betreten
  - Kamera erlaubt dir, Bereiche aus der Ferne mit Nachtsicht zu erkunden
  - Phantom-Viewer zeigt Verstecker-Positionen auf einer Karte
  - Duftspur zeigt dir, wo Verstecker waren
  
  <bold>Kontrolliere das Schlachtfeld:</bold>
  - Käfigfalle immobilisiert Verstecker und macht sie zu leichten Zielen
  - Fluchzauber schwächt Verstecker, sodass sie mehr Schaden nehmen
  - Block-Randomizer zwingt Verstecker aus ihrer Tarnung
  - Blitz-Einfrieren stoppt Verstecker auf der Stelle
  
  <bold>Nutze Beweglichkeitsgegenstände:</bold>
  - Enterhaken hilft dir, hohe Orte schnell zu erreichen
  - Kettenzug zieht Verstecker zu dir
  - Tintenspritzer blendet Verstecker und macht sie zu leichten Zielen
  
  <bold>Wirf dein Schwert:</bold>
  Die Seeker's Blade kann durch langes Rechtsklicken geworfen werden. Je länger du auflädst, desto stärker der Wurf. Meistere das Timing für Weitwurf-Eliminierungen.
  
  <bold>Arbeitet zusammen:</bold>
  Koordiniere dich mit anderen Suchern, um Verstecker in die Enge zu treiben. Nutze den Sucher-Assistenten, um Bereiche zu patrouillieren, während du woanders suchst.
  
  <bold>Kaufe Fähigkeiten:</bold>
  Sucher-Fähigkeiten wie Proximity Meter, Death Zone oder Random Swap geben dir mächtige Vorteile. Nutze deine Punkte mit Bedacht.

