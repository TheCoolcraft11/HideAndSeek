body: |
  <bold>1. Nicht cheaten</bold>
  Verwende keine gehackten Clients, X-Ray-Texturpakete oder andere externe Modifikationen, die dir einen unfairen Vorteil verschaffen. Das Plugin enthält Anti-Cheat-Sichtbarkeitssysteme, um Wall-Hacking zu verhindern.
  
  <bold>2. Nicht ghosten</bold>
  Gib keine Informationen über Verstecker-Positionen an Sucher weiter (oder umgekehrt) über externe Kommunikation. Das verdirbt das Spiel für alle.
  
  <bold>3. Nicht ausnutzen</bold>
  Nutze keine Glitches, Bugs oder unbeabsichtigte Mechaniken aus. Melde Fehler dem Server-Team.
  
  <bold>4. Keine teamübergreifende Zusammenarbeit</bold>
  Verstecker und Sucher sollten nicht zusammenarbeiten. Spiele deine Rolle fair.
  
  <bold>5. Nicht an einem Ort campen</bold>
  Verstecker müssen in Bewegung bleiben. Das Anti-Camping-System bestraft Spieler, die zu lange an einem Ort bleiben.
  
  <bold>6. Respektiere andere</bold>
  Behandle alle Spieler mit Respekt. Belästigung, toxisches Verhalten oder unsportliches Betragen werden nicht toleriert.
  
  <bold>7. Befolge die Anweisungen des Teams</bold>
  Server-Administratoren und Moderatoren haben das letzte Wort. Befolge ihre Anweisungen jederzeit.
  
  Verstöße gegen diese Regeln können je nach Schweregrad zu Verwarnungen, temporären Banns oder permanenten Banns führen.

