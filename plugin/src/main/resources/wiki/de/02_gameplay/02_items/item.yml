body: |
  Verstecker haben Zugriff auf eine Vielzahl von Gegenständen, die ihnen bei der Flucht und dem Überleben helfen. Gegenstände befinden sich im Verstecker-Inventar und haben unterschiedliche Seltenheitsstufen.

  Durchstöbere den Gegenstände-Bereich, um mehr über jeden Gegenstand zu erfahren.

