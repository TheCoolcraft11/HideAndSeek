body: |
  Suchende haben Zugriff auf eine Vielzahl von Gegenständen, die ihnen helfen, Verstecker aufzuspüren und zu eliminieren. Gegenstände befinden sich im Suchender-Inventar und haben unterschiedliche Seltenheitsstufen.

  Durchstöbere den Gegenstände-Bereich, um mehr über jeden Gegenstand zu erfahren.

