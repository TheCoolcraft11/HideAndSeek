body: |
  Der <green>Proximity Sensor</green> ist ein %rarity-proximity_sensor% Gegenstand. Er kann auf dem Boden platziert oder an Wänden befestigt werden.
  
  Wenn ein Verstecker die Erkennungsreichweite des Sensors von <#00ffff>%setting-seeker-items.proximity-sensor.range% Blöcken</#00ffff> betritt und sich in seinem Sichtfeld von <#00ffff>%setting-seeker-items.proximity-sensor.fov-angle%°</#00ffff> befindet, beginnt der Verstecker zu leuchten. Zusätzlich hört der Sensor-Besitzer ein Benachrichtigungsgeräusch, wenn ein Verstecker erkannt wird.
  Der Proximity Sensor bleibt für <#00ffff>%setting-seeker-items.proximity-sensor.duration%s</#00ffff> (-1 = bis die Runde endet) aktiv.
  Das Item hat eine Abklingzeit von <#00ffff>%setting-seeker-items.proximity-sensor.cooldown%s</#00ffff>.

