body: |
  Alle Befehle werden über <gold>/mg <subcommand></gold> (oder <gold>/minigame <subcommand></gold>) verwendet.
  
  <bold>Spielerbefehle:</bold>
  
  <gold>/mg loadout</gold> — Öffnet die Loadout-Auswahl, wo du deine Gegenstände für die Runde auswählen kannst.
  Aliase: <gray>/mg kit, /mg items</gray>
  
  <gold>/mg vote</gold> — Öffnet die Abstimmungs-GUI, um über Karten, Spielmodi und bevorzugte Rollen abzustimmen.
  
  <gold>/mg ready</gold> — Schaltet deinen Bereitschaftsstatus um. Wenn alle Spieler bereit sind, startet das Spiel sofort.
  Aliase: <gray>/mg rdy</gray>
  
  <gold>/mg skin <item> <variant></gold> — Wähle ein Skin (Variante) für einen bestimmten Gegenstand. Verwende <gold>/mg skin list <item></gold>, um verfügbare Skins zu sehen.
  Aliase: <gray>/mg skins, /mg variant, /mg itemskin</gray>
  
  <gold>/mg stats</gold> — Öffnet die Spielerstatistik-GUI, um deine Leistungsdaten einzusehen.
  Aliase: <gray>/mg statistics</gray>
  
  <gold>/mg unstuck</gold> — Versucht, dich an eine sichere Position zu teleportieren, falls du feststeckst. Erfordert eine 5-sekündige Kanalisierung und du musst stillstehen.
  Aliase: <gray>/mg stuckfix</gray>
  Verwende <gold>/mg unstuck spawn</gold>, um stattdessen zum Welt-Spawn zu teleportieren.
  
  <bold>Admin-Befehle:</bold>
  
  <gold>/mg map [name]</gold> — Öffnet die Kartenauswahl-GUI oder wählt direkt eine Karte aus.
  Aliase: <gray>/mg selectmap, /mg choosemap</gray>
  
  <gold>/mg loadout admin</gold> — Öffnet die Admin-Loadout-Verwaltungs-GUI.
  
  <gold>/mg debug <subcommand></gold> — Debug-Dienstprogramme. Unterbefehle: anticheat, points, coins, skins, loadout, perks, config, unstuck, migrateyaml, xp, booster.

