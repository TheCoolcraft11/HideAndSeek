body: |
  Der <green>Trap Sense</green> ist ein %perk-rarity-hider_trap_sense% Hider-Vorteil.
  
  Deckt nahegelegene Sucher-Fallen und -Nutzgegenstände auf:
  - Zeigt Partikeleffekte um Käfigfallen in Reichweite
  - Lässt Näherungssensor-Kreaturen rot leuchten
  - Lässt Käfigfallen-Indikatoren gelb leuchten
  - Lässt Kamera-Kreaturen blau leuchten
  - Warnt dich mit einem Titel und Sound, wenn du dich in der Nähe einer Falle befindest
  
  Dieser Vorteil ist unbezahlbar für Hider, die sich in Bereichen bewegen, in denen Sucher Fallen platziert haben.

