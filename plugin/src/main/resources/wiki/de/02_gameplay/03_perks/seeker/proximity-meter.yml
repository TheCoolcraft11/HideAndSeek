body: |
  Der <green>Proximity Meter</green> ist ein %perk-rarity-seeker_proximity_meter% Sucher-Vorteil.
  
  Zeigt regelmäßig einen Titel an, der anzeigt, wie nah du dem nächsten Hider bist. Die Anzeige ändert sich basierend auf der Entfernung:
  - <red>Brennend heiß</red> — innerhalb von 5 Blöcken
  - <gold>Sehr warm</gold> — innerhalb von 10 Blöcken
  - <yellow>Warm</yellow> — innerhalb von 18 Blöcken
  - <green>Lauwarm</green> — innerhalb von 30 Blöcken
  - <aqua>Kühl</aqua> — innerhalb von 50 Blöcken
  - <gray>Kalt</gray> — weiter als 50 Blöcke
  
  Ein akustischer Ping ertönt bei jeder Anzeige, mit höherer Tonhöhe für nähere Ziele.

