body: |
  Verstecker-Fähigkeiten bieten passive oder aktive Vorteile, die dir beim Überleben helfen. Fähigkeiten können während der Versteck-Phase im Fähigkeitenladen gekauft werden.

  Verstecker-Fähigkeiten bieten meist langfristige oder permanente Vorteile, die dir oft helfen, aus gefährlichen Situationen zu entkommen.

