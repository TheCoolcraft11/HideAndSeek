body: |
  HideAndSeek bietet vier Spielmodi, die ändern, wie sich Hider tarnen.
  
  <bold>NORMAL-Modus</bold>
  Hider erscheinen mit ihrem normalen Spieler-Skin. Keine speziellen Tarnmechaniken — verstecke dich mit der Umgebung und deinen Gegenständen.
  
  <bold>SMALL-Modus</bold>
  Hider werden auf <#00ffff>%setting-game.small-mode.hider-size%</#00ffff> ihrer normalen Größe geschrumpft. Dies macht es einfacher, sich in kleinen Räumen, hinter Blöcken oder in dekorativen Elementen zu verstecken.
  
  <bold>BLOCK-Modus</bold>
  Hider können sich als Blöcke tarnen, indem sie sich für ein paar Sekunden hinhocken. Sobald getarnt, erscheinen sie für Sucher als normaler Block. Verwende den Aussehen-Editor, um deinen Blocktyp und Blockzustand zu wählen. Das Zerstören des Tarnblocks eines Hiders erfordert das richtige Werkzeug für diesen Blocktyp.
  
  <bold>SKIN-Modus</bold>
  Hider können ihren Spieler-Skin zu jedem Skin ändern, der aus dem Skin-Shop geladen wurde. Dies ermöglicht das Verschmelzen mit benutzerdefinierten NPC-Skins oder der Umgebung.

