body: |
  Im <bold>GAZE KILL</bold>-Modus können Suchende Verstecker eliminieren, indem sie sie innerhalb der Reichweite und Sichtlinie ansehen. Eine Laserpartikellinie zeigt das Blickziel an. Dieser Modus hat eine Abklingzeit zwischen den Tötungen.

  Siehe {kill-modes} für alle verfügbaren Kill-Modi.

