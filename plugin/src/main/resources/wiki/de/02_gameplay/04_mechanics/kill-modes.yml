body: |
  Sucher haben verschiedene Kill-Modi, die ändern, wie sie Hider eliminieren.
  
  <bold>NORMAL-Modus</bold>
  Hider haben standardmäßige Gesundheit. Sucher müssen Hider durch normalen Kampf schädigen, um sie zu eliminieren. Treffer mit der Seeker-Klinge verursachen Schaden basierend auf der Aufladezeit.
  
  <bold>ONE HIT-Modus</bold>
  Jeder erfolgreiche Treffer an einem Hider eliminiert ihn sofort. Es gibt keine Gesundheitsverwaltung — eine Berührung genügt.
  
  <bold>GAZE KILL-Modus</bold>
  Sucher können Hider eliminieren, indem sie sie einfach innerhalb der Reichweite und Sichtlinie ansehen. Eine Laser-Partikellinie zeigt das Blickziel an. Dieser Modus hat eine Abklingzeit zwischen den Kills.

