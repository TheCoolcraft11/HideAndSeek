body: |
  Das Anti-Camping-System verhindert, dass Hider zu lange an einem Ort bleiben.
  
  Wenn ein Hider über einen längeren Zeitraum in einem kleinen Radius bleibt, erhält er:
  1. Warnungstitel und Partikeleffekte
  2. Allmählichen Schaden, der mit der Zeit zunimmt
  
  Camping-Schaden wird als Umweltschaden erfasst und zeigt eine benutzerdefinierte Todesnachricht an. Das Bewegen in einen anderen Bereich setzt den Camping-Timer zurück.
  
  <bold>Tipps:</bold>
  - Bleib in Bewegung und wechsle regelmäßig deine Verstecke
  - Verwende Gegenstände wie Rauchbomben oder Geschwindigkeitsschub, um dich sicher umzusiedeln
  - Camping-Tode zählen weiterhin als Umwelt-Eliminierungen und vergeben Punkte an alle Sucher

