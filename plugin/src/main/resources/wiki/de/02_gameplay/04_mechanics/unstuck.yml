body: |
  Wenn du in einem Block oder einem unzugänglichen Bereich feststeckst, verwende den Befehl <gold>/mg unstuck</gold>.
  
  Das System funktioniert wie folgt:
  1. Aktiviere den Befehl — ein 5-Sekunden-Kanal beginnt
  2. Du musst während des Kanals stillstehen (Bewegung bricht ihn ab)
  3. Hinhocken für 3+ Sekunden bricht den Teleport ebenfalls ab
  4. Nach dem Kanal wirst du an eine sichere Position teleportiert
  
  Das System wird versuchen:
  - Dich zu einer kürzlich von dir besetzten sicheren Position zurückzusetzen
  - Den nächstgelegenen sicheren Boden zu finden
  - Auf den Runden-Spawnpunkt zurückzugreifen
  - Als letzten Ausweg zum Welt-Spawn zu teleportieren (verwende <gold>/mg unstuck spawn</gold>)
  
  Hider können Entstecken nicht verwenden, wenn ein Sucher in der Nähe ist (innerhalb der Reichweite). Der Befehl hat eine Abklingzeit zwischen den Verwendungen.

