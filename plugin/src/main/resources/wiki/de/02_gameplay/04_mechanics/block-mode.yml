body: |
  Im <bold>BLOCK</bold>-Spielmodus können sich Hider als jeden Block im Spiel tarnen.
  
  Zum Tarnen musst du dich nur für ein paar Sekunden hinhocken (Umschalttaste gedrückt halten). Ein Fortschrittsbalken in deiner XP-Leiste zeigt den Tarnfortschritt an. Sobald du getarnt bist, erscheinst du für alle Sucher als normaler Block.
  
  Verwende den Aussehen-Editor, um auszuwählen, als welcher Block du dich tarnen möchtest. Du kannst auch Blockzustandseigenschaften (Richtung, Wasser gefüllt usw.) anpassen.
  
  <bold>Während der Tarnung:</bold>
  - Du bist für Sucher als Spieler-Entity unsichtbar
  - Eine Block-Anzeige-Entity erscheint an deiner Stelle
  - Sucher können deinen Tarnblock zerstören — die Verwendung des richtigen Werkzeugs für den Blocktyp verursacht zusätzlichen Schaden
  - Bewegung oder Interaktion bricht die Tarnung ab
  - Du kannst dich umsehen, ohne die Tarnung zu brechen
  
  Verwende den Block-Auswähler, um schnell durch deine Lieblingsblöcke zu wechseln.

