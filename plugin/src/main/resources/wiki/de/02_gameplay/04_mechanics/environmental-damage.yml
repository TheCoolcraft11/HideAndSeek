body: |
  Während der Suchphase können Hider Schaden durch Umweltquellen erleiden:
  - Ertrinken
  - Feuer und Lava
  - Ersticken in Wänden
  - Erfrieren (Pulverschnee)
  - Camping (zu lange an einem Ort bleiben)
  - Weltgrenze
  
  Umweltschaden wird vom Spiel erfasst und mit benutzerdefinierten Todesnachrichten angezeigt. Hider haben eine kurze Schonfrist zu Beginn der Suchphase, bevor Umweltschaden vollständig aktiviert ist.
  
  Wenn ein Hider durch Umweltursachen stirbt, erhalten alle Sucher Umwelt-Eliminierungspunkte.
  
  Einige Gegenstände wie Medkits und Totem der Unsterblichkeit können dir helfen, Umweltgefahren zu überleben.

