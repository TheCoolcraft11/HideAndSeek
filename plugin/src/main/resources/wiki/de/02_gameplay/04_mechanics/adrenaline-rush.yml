body: |
  Das Adrenalinrausch-System bietet Comeback-Buffs, um das Spiel auszugleichen, wenn eine Seite im Nachteil ist.
  
  <bold>Hider-Adrenalinrausch</bold>
  Wenn nur noch wenige Hider am Leben sind, erhalten alle überlebenden Hider mächtige Buffs: Geschwindigkeit, Resistenz und Regeneration. Dies gibt den verbleibenden Hidern eine Chance, bis zum Ende der Runde zu überleben.
  
  <bold>Sucher-Adrenalinrausch</bold>
  Wenn der Runden-Timer fast abgelaufen ist und noch viele Hider am Leben sind, erhalten Sucher Buffs: Geschwindigkeit, Eile und Regeneration. Dies hilft Suchern, die Runde zu beenden, bevor die Zeit abläuft.
  
  Beide Rausche werden von visuellem und akustischem Feedback begleitet — Titel, Sounds, Partikel und ein falscher Weltgrenzen-Warnungseffekt.

