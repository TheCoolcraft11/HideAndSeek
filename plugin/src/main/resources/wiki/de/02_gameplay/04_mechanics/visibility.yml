body: |
  Das Sichtbarkeitssystem bestimmt, was Sucher während des Spiels sehen können.
  
  <bold>Während der Versteckphase:</bold>
  Sucher sind vollständig geblendet. Sie können sich nicht bewegen oder Hider sehen. Dies gibt Hidern Zeit, ihre Verstecke zu finden.
  
  <bold>Während der Suchphase:</bold>
  Die Sicht der Sucher wird durch ein Sichtlinien- und Reichweitensystem gesteuert:
  - Sucher können Hider nur innerhalb einer bestimmten Reichweite sehen
  - Hider hinter Wänden oder Hindernissen sind nicht sichtbar
  - Sucher haben eine Sichtfeld-Überprüfung — Hider hinter dem Sucher sind nicht sichtbar
  - Versteckte Hider (im BLOCK-Modus) sind als Entities vollständig unsichtbar
  
  <bold>Anti-Cheat:</bold>
  Das Plugin verwendet NMS-Level-Paketfilterung, um sicherzustellen, dass Sucher nicht durch Wände sehen oder unfaire Vorteile erlangen können. Die Sichtbarkeit von Entities wird auf Netzwerkebene synchronisiert, um Geister-Spieler oder Cheating zu verhindern.

